<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Ape Society</title>
    <link rel="icon" type="image/png" href="./basicapesocietyfavicon.png" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: #000;
      }

      .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .full-link {
        position: absolute;
        inset: 0;
        display: block;
      }

      .hero {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: fill;
        pointer-events: none;
      }

      .hotspot {
        position: absolute;
        z-index: 1;
        display: block;
      }

      .hotspot.github {
        left: 18.6%;
        top: 65.2%;
        width: 16.5%;
        height: 16.5%;
        border-radius: 50%;
      }

      .hotspot.pumpfun {
        left: 64.7%;
        top: 66.2%;
        width: 14.8%;
        height: 11.8%;
        border-radius: 999px;
      }

      .full-link:focus-visible,
      .hotspot:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <a
        class="full-link"
        href="https://x.com/basicapesociety"
        aria-label="Visit Basic Ape Society on X"
      >
        <img class="hero" src="./basicapesociety.png" alt="Basic Ape Society artwork" />
      </a>
      <a
        class="hotspot github"
        href="https://pump.fun/profile/basicapesociety"
        aria-label="Visit Basic Ape Society on Pump.fun"
      ></a>
      <a
        class="hotspot pumpfun"
        href="https://pump.fun/profile/basicapesociety"
        aria-label="Visit Basic Ape Society on Pump.fun"
      ></a>
    </main>
  </body>
</html>
