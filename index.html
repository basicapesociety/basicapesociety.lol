<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Ape Society</title>
    <link rel="icon" type="image/png" href="./basicapesocietyfavicon.png" />
    <style>
      :root {
        color-scheme: only light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        position: relative;
        overflow: hidden;
        background: #050505;
      }

      body::before {
        content: "";
        position: fixed;
        inset: -3%;
        background: url("./basicapesociety.png") center center / cover no-repeat;
        filter: blur(22px) brightness(0.4) saturate(0.9);
        transform: scale(1.05);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top, rgba(255, 214, 120, 0.14), transparent 42%),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.5));
      }

      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 2vmin;
      }

      .hero {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <img class="hero" src="./basicapesociety.png" alt="Basic Ape Society artwork" />
    </main>
  </body>
</html>
